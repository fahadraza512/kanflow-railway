<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#gradient)"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Letter K with modern design -->
  <g filter="url(#shadow)">
    <!-- Main vertical line of K -->
    <rect x="140" y="140" width="70" height="232" rx="12" fill="white"/>
    
    <!-- Upper diagonal of K -->
    <path d="M210 200 L340 140 L370 165 L240 225 Z" fill="white"/>
    <rect x="330" y="140" width="70" height="70" rx="12" fill="white" transform="rotate(25 365 175)"/>
    
    <!-- Lower diagonal of K -->
    <path d="M210 260 L340 372 L310 397 L180 285 Z" fill="white"/>
    <rect x="300" y="342" width="70" height="70" rx="12" fill="white" transform="rotate(-25 335 377)"/>
    
    <!-- Accent dot (representing flow/movement) -->
    <circle cx="380" cy="256" r="20" fill="#60A5FA"/>
  </g>
</svg>
